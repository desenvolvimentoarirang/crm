# ─────────────────────────────────────────────────────────────────────────────
# CRM WhatsApp — docker-compose unificado
#
# Todos os segredos ficam no arquivo .env na raiz do projeto.
# Para subir tudo:  docker-compose up -d
# Apenas infra:     docker-compose up -d postgres redis evolution-api
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ───────────────────────────────────────────────────────── PostgreSQL ──────
  postgres:
    container_name: postgres
    image: postgres:15-alpine
    restart: unless-stopped
    networks:
      - crm-net
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Cria o database padrão; evolution e crm são criados pelo init.sql
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Script executado na primeira inicialização (cria DBs evolution e crm)
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c log_min_duration_statement=1000
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────────────────────────── Redis ──────
  redis:
    container_name: redis
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - crm-net
    ports:
      - '6379:6379'
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ────────────────────────────────────────────────────────────── pgAdmin ──────
  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    networks:
      - crm-net
    ports:
      - '4000:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────── SQL Server ──────
  mssql:
    container_name: mssql
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    networks:
      - crm-net
    ports:
      - '1433:1433'
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    volumes:
      - mssql_data:/var/opt/mssql

  # ──────────────────────────────────────────────────────── Evolution API ──────
  evolution-api:
    container_name: evolution-api
    image: atendai/evolution-api:latest
    restart: unless-stopped
    networks:
      - crm-net
    ports:
      - '8080:8080'
    environment:
      # ── Servidor ────────────────────────────────────────────────────────────
      SERVER_TYPE: http
      SERVER_PORT: 8080
      # URL pública (usada para gerar QR codes e links — manter como localhost para dev)
      SERVER_URL: ${EVOLUTION_SERVER_URL:-http://localhost:8080}

      # ── CORS ────────────────────────────────────────────────────────────────
      CORS_ORIGIN: '*'
      CORS_METHODS: GET,POST,PUT,DELETE
      CORS_CREDENTIALS: 'true'

      # ── Log ─────────────────────────────────────────────────────────────────
      LOG_LEVEL: ERROR,WARN,INFO,WEBHOOKS
      LOG_COLOR: 'true'
      LOG_BAILEYS: error

      # ── Banco de dados ──────────────────────────────────────────────────────
      DATABASE_ENABLED: 'true'
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution_exchange
      DATABASE_SAVE_DATA_INSTANCE: 'true'
      DATABASE_SAVE_DATA_NEW_MESSAGE: 'true'
      DATABASE_SAVE_MESSAGE_UPDATE: 'true'
      DATABASE_SAVE_DATA_CONTACTS: 'true'
      DATABASE_SAVE_DATA_CHATS: 'true'
      DATABASE_SAVE_DATA_LABELS: 'true'
      DATABASE_SAVE_DATA_HISTORIC: 'true'

      # ── Redis (DB 1 — exclusivo da Evolution) ───────────────────────────────
      CACHE_REDIS_ENABLED: 'true'
      CACHE_REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379/1
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: 'false'
      CACHE_LOCAL_ENABLED: 'false'

      # ── Autenticação ────────────────────────────────────────────────────────
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: 'true'

      # ── QR Code ─────────────────────────────────────────────────────────────
      QRCODE_LIMIT: 30
      QRCODE_COLOR: '#198754'

      # ── Webhook global → CRM backend ────────────────────────────────────────
      # O backend recebe todos os eventos do WhatsApp aqui.
      WEBHOOK_GLOBAL_ENABLED: 'true'
      WEBHOOK_GLOBAL_URL: http://crm-backend:3000/api/webhooks/evolution
      # true = envia o tipo do evento no payload (facilita o roteamento no backend)
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: 'true'
      # Eventos relevantes para o CRM
      WEBHOOK_EVENTS_MESSAGES_UPSERT: 'true'
      WEBHOOK_EVENTS_MESSAGES_UPDATE: 'true'
      WEBHOOK_EVENTS_CONNECTION_UPDATE: 'true'
      WEBHOOK_EVENTS_QRCODE_UPDATED: 'true'
      WEBHOOK_EVENTS_SEND_MESSAGE: 'true'

      # ── Sessão ──────────────────────────────────────────────────────────────
      CONFIG_SESSION_PHONE_CLIENT: CRM WhatsApp
      CONFIG_SESSION_PHONE_NAME: Chrome
      DEL_INSTANCE: 'false'
      # Let Evolution API use its bundled Baileys version (setting this manually causes 405 rejections)
      # BAILEYS_VERSION: 2.3000.1023541099

      # ── Integrações desabilitadas ────────────────────────────────────────────
      OPENAI_ENABLED: 'false'
      DIFYAI_ENABLED: 'false'
      TYPEBOT_ENABLED: 'false'
      CHATWOOT_ENABLED: 'false'
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────── CRM Backend ──────
  crm-backend:
    container_name: crm-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
      # "development" roda `npm run dev` com tsx watch + hot reload
      target: development
    restart: unless-stopped
    networks:
      - crm-net
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000

      # Aponta para o DB `crm` (separado do `evolution`)
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/crm

      # Redis DB 2 — exclusivo do CRM (Evolution usa DB 1)
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d

      # Evolution API (nome do container como host dentro da rede Docker)
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      BACKEND_URL: http://crm-backend:3000

      # CORS — URL do frontend no browser
      FRONTEND_URL: http://localhost:5173

      LOG_LEVEL: info
    volumes:
      # Hot reload em desenvolvimento: monta apenas o src
      - ./backend/src:/app/src
      # Evita sobrescrever o node_modules do container com o do host
      - /app/node_modules
      # Baileys WhatsApp sessions
      - baileys_sessions:/app/baileys-sessions
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # wget vem nativo no alpine; evita precisar instalar curl na imagem de dev
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ────────────────────────────────────────────────────────── CRM Frontend ──────
  crm-frontend:
    container_name: crm-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    networks:
      - crm-net
    ports:
      - '5173:5173'
    environment:
      # Proxy do Vite roteia /api e /socket.io para o backend via rede Docker
      VITE_API_URL: http://crm-backend:3000
      VITE_SOCKET_URL: http://crm-backend:3000
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    depends_on:
      crm-backend:
        condition: service_healthy

# ─────────────────────────────────────────────────────────────── Volumes ──────
volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  evolution_instances:
  baileys_sessions:
  mssql_data:

# ─────────────────────────────────────────────────────────────── Network ──────
networks:
  crm-net:
    name: crm-net
    driver: bridge
